syntax = "proto3";

package users;

import "google/protobuf/timestamp.proto";

// Internal user lookup between microservices. Password and TOTP secrets are never exposed.

service UsersService {
  rpc GetUserById(GetUserByIdRequest) returns (GetUserResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserResponse);
  rpc GetUserByPhone(GetUserByPhoneRequest) returns (GetUserResponse);
}

message GetUserByIdRequest {
  int64 id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByPhoneRequest {
  string phone = 1;
}

message GetUserResponse {
  bool success = 1;
  UserResponse user = 2;
  string message = 3;
}

message UserResponse {
  int64 id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  UserGender gender = 5;
  string date_of_birth = 6; // YYYY-MM-DD
  string phone_number = 7;
  UserRole role = 8;
  UserStatus status = 9;
  bool is_2fa_enabled = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 1;
  USER_ROLE_CUSTOMER = 2;
  USER_ROLE_EMPLOYEE = 3;
  USER_ROLE_MANAGER = 4;
}

enum UserGender {
  USER_GENDER_UNSPECIFIED = 0;
  USER_GENDER_MALE = 1;
  USER_GENDER_FEMALE = 2;
  USER_GENDER_OTHER = 3;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_PENDING = 1;
  USER_STATUS_ACTIVE = 2;
  USER_STATUS_INACTIVE = 3;
  USER_STATUS_BANNED = 4;
}
