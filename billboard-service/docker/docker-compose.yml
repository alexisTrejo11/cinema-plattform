name: billboard-service

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cinema_billboard}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cinema_billboard}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  app.:
    build:
      context: ..
      dockerfile: docker/dockerfile
    image: billboard-service:local
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command: ["/app.ocker/docker-entrypoint.sh", "serve"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - billboard_network

  app.:
    build:
      context: ..
      dockerfile: docker/dockerfile
    image: billboard-service:local
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command: ["/app.ocker/docker-entrypoint.sh", "serve"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - billboard_network

  app.:
    build:
      context: ..
      dockerfile: docker/dockerfile
    image: billboard-service:local
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command: ["/app.ocker/docker-entrypoint.sh", "serve"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - billboard_network

  migrate:
    build:
      context: ..
      dockerfile: docker/dockerfile
    image: billboard-service:local
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ""
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command: ["/app.ocker/docker-entrypoint.sh", "migrate"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - tools

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      - app.
      - app.
      - app.
    ports:
      - "80:80"
      - "443:443"
    networks:
      - billboard_network
    volumes:
      - ./nginx/logs:/var/log/nginx

networks:
  billboard_network:
    driver: bridge

volumes:
  postgres_data:
