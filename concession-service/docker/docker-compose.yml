name: concession-service

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    networks:
      - concession_network
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - concession_network
    environment:
      POSTGRES_DB: ${DB_NAME:-cinema_concession}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cinema_concession}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  app-1:
    build:
      context: ..
      dockerfile: docker/dockerfile
    image: concession-service:local
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}
      TEST_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}_test
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: ["/app/docker/docker-entrypoint.sh", "serve"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concession_network

  app-2:
    image: concession-service:local
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}
      TEST_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}_test
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: ["/app/docker/docker-entrypoint.sh", "serve"]
    depends_on:
      app-1:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concession_network

  app-3:
    image: concession-service:local
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}
      TEST_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}_test
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: ["/app/docker/docker-entrypoint.sh", "serve"]
    depends_on:
      app-1:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concession_network

  migrate:
    image: concession-service:local
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}
      TEST_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cinema_concession}_test
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: ["/app/docker/docker-entrypoint.sh", "migrate"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concession_network
    profiles:
      - tools

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      - app-1
      - app-2
      - app-3
    ports:
      - "80:80"
      - "443:443"
    networks:
      - concession_network
    volumes:
      - ./nginx/logs:/var/log/nginx

networks:
  concession_network:
    driver: bridge

volumes:
  postgres_data: